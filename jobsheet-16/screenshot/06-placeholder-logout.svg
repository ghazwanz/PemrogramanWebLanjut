<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Placeholder Logout API">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="76" y="64" width="1132" height="592" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="124" y="124" font-family="Arial, sans-serif" font-size="32" fill="#111827">POST /api/logout</text>
  <rect x="124" y="184" width="1008" height="64" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="156" y="224" font-family="Arial, sans-serif" font-size="22" fill="#334155">Authorization: Bearer &lt;token&gt;</text>
  <rect x="124" y="300" width="1008" height="160" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="156" y="386" font-family="Arial, sans-serif" font-size="24" fill="#166534">{ "data": "Tokens revoked", "message": null }</text>
  <text x="402" y="604" font-family="Arial, sans-serif" font-size="28" fill="#64748b">Ganti dengan screenshot Postman logout</text>
</svg>
