<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Placeholder Bearer Token">
  <rect width="1280" height="720" fill="#f8fafc"/>
  <rect x="76" y="64" width="1132" height="592" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="124" y="124" font-family="Arial, sans-serif" font-size="32" fill="#111827">Authorization: Bearer Token</text>
  <rect x="124" y="184" width="1008" height="64" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="156" y="224" font-family="Arial, sans-serif" font-size="22" fill="#334155">Bearer &lt;token dari register atau login&gt;</text>
  <rect x="124" y="300" width="1008" height="160" rx="6" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="156" y="386" font-family="Arial, sans-serif" font-size="24" fill="#155e75">Gunakan token untuk endpoint /api/logout dan /api/todos</text>
